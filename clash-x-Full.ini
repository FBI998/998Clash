使用说明与避坑指南
关于 Claude 访问：

我已在 🤖 Claude 分组中默认移除了“香港”等节点。如果依然无法访问，请点击该分组，尝试手动切换到 🇺🇸 美国节点 或 🏠 家宽节点。

关于 DNS 泄漏：

该配置文件已通过 no-resolve 标记优化了 GeoIP 匹配。请配合 OpenClash 设置中的 “Fake-IP 模式” 和 “自定义上游 DNS 服务器” 使用。

如何更新：

如果你发现 Claude 规则没生效，去 OpenClash 的“版本更新”里，手动点一下 GeoSite 更新。


